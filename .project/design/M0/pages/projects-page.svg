<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="progress-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="900" fill="#F8FAFC"/>
  
  <!-- ==================== Header ==================== -->
  <g id="header">
    <rect width="1200" height="64" fill="white" filter="url(#shadow-sm)"/>
    <!-- 返回按钮 -->
    <g transform="translate(24, 16)">
      <rect width="80" height="32" rx="6" fill="#F1F5F9"/>
      <text x="16" y="21" font-family="Inter, sans-serif" font-size="14" fill="#64748B">← 返回</text>
    </g>
    <text x="120" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#0F172A">Projects > char-counter</text>
  </g>
  
  <!-- ==================== 项目概览卡片 ==================== -->
  <g id="project-overview" transform="translate(32, 88)">
    <rect width="1136" height="140" rx="12" fill="white" filter="url(#shadow-md)"/>
    
    <!-- 项目名称和阶段 -->
    <text x="24" y="32" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#0F172A">char-counter</text>
    
    <g transform="translate(200, 12)">
      <rect width="80" height="28" rx="6" fill="#DBEAFE"/>
      <text x="40" y="19" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#2563EB">Phase 3</text>
    </g>
    
    <g transform="translate(290, 12)">
      <rect width="80" height="28" rx="6" fill="#3B82F6"/>
      <text x="40" y="19" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="white">开发中</text>
    </g>
    
    <!-- 分隔线 -->
    <line x1="24" y1="56" x2="1112" y2="56" stroke="#E2E8F0" stroke-width="1"/>
    
    <!-- 进度条 -->
    <text x="24" y="80" font-family="Inter, sans-serif" font-size="14" fill="#64748B">进度 80%</text>
    <rect x="24" y="88" width="800" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="24" y="88" width="640" height="8" rx="4" fill="url(#progress-grad)"/>
    
    <!-- 统计 -->
    <g transform="translate(900, 64)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="12" fill="#64748B">等待</text>
      <text x="0" y="20" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#F59E0B">Designer</text>
    </g>
    
    <g transform="translate(1020, 64)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="12" fill="#64748B">任务</text>
      <text x="0" y="20" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#0F172A">8/12</text>
    </g>
  </g>
  
  <!-- ==================== Tab 栏 ==================== -->
  <g id="tabs" transform="translate(32, 248)">
    <rect width="1136" height="44" rx="0" fill="white" filter="url(#shadow-sm)"/>
    
    <!-- Tab 项 -->
    <g transform="translate(0, 0)">
      <rect width="120" height="44" fill="white"/>
      <text x="60" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#3B82F6">Agent 状态</text>
      <rect x="0" y="42" width="120" height="2" fill="#3B82F6"/>
    </g>
    
    <g transform="translate(120, 0)">
      <rect width="80" height="44" fill="white"/>
      <text x="40" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#64748B">任务</text>
    </g>
    
    <g transform="translate(200, 0)">
      <rect width="80" height="44" fill="white"/>
      <text x="40" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#3B82F6">测试结果</text>
      <rect x="0" y="42" width="80" height="2" fill="#3B82F6"/>
    </g>
    
    <g transform="translate(280, 0)">
      <rect width="80" height="44" fill="white"/>
      <text x="40" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#64748B">Bugs</text>
    </g>
    
    <g transform="translate(360, 0)">
      <rect width="80" height="44" fill="white"/>
      <text x="40" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#64748B">版本</text>
    </g>
  </g>
  
  <!-- ==================== 测试结果 Tab 内容 ==================== -->
  <g id="test-results" transform="translate(32, 312)">
    <rect width="1136" height="560" rx="12" fill="white" filter="url(#shadow-sm)"/>
    
    <!-- 测试统计卡片 -->
    <g transform="translate(24, 24)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#0F172A">测试概览</text>
      
      <g transform="translate(0, 30)">
        <!-- 通过率 -->
        <g filter="url(#shadow-sm)">
          <rect width="240" height="100" rx="12" fill="#F8FAFC"/>
          <text x="20" y="30" font-family="Inter, sans-serif" font-size="12" fill="#64748B">通过率</text>
          <text x="20" y="65" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#10B981">85%</text>
          <rect x="20" y="78" width="200" height="6" rx="3" fill="#E2E8F0"/>
          <rect x="20" y="78" width="170" height="6" rx="3" fill="#10B981"/>
        </g>
        
        <!-- 总数 -->
        <g transform="translate(260, 0)" filter="url(#shadow-sm)">
          <rect width="180" height="100" rx="12" fill="#F8FAFC"/>
          <text x="20" y="30" font-family="Inter, sans-serif" font-size="12" fill="#64748B">总数</text>
          <text x="20" y="65" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#0F172A">20</text>
        </g>
        
        <!-- 通过 -->
        <g transform="translate(460, 0)" filter="url(#shadow-sm)">
          <rect width="180" height="100" rx="12" fill="#F8FAFC"/>
          <text x="20" y="30" font-family="Inter, sans-serif" font-size="12" fill="#64748B">通过</text>
          <text x="20" y="65" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#10B981">17</text>
        </g>
        
        <!-- 失败 -->
        <g transform="translate(660, 0)" filter="url(#shadow-sm)">
          <rect width="180" height="100" rx="12" fill="#F8FAFC"/>
          <text x="20" y="30" font-family="Inter, sans-serif" font-size="12" fill="#64748B">失败</text>
          <text x="20" y="65" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#EF4444">3</text>
        </g>
      </g>
    </g>
    
    <!-- 测试报告列表 -->
    <g transform="translate(24, 180)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#0F172A">测试报告历史</text>
      
      <!-- 报告表格 -->
      <g transform="translate(0, 30)" filter="url(#shadow-sm)">
        <rect width="1088" height="300" rx="12" fill="white"/>
        
        <!-- 表头 -->
        <rect width="1088" height="44" rx="12" fill="#F8FAFC"/>
        <rect y="44" width="1088" height="1" fill="#E2E8F0"/>
        <text x="24" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#64748B">版本</text>
        <text x="150" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#64748B">日期</text>
        <text x="300" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#64748B">总数</text>
        <text x="400" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#64748B">通过</text>
        <text x="500" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#64748B">失败</text>
        <text x="600" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#64748B">跳过</text>
        <text x="700" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#64748B">覆盖率</text>
        <text x="850" y="28" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#64748B">状态</text>
        
        <!-- 行 1 -->
        <g transform="translate(0, 52)">
          <rect y="43" width="1088" height="1" fill="#F1F5F9"/>
          <text x="24" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#0F172A">v0.3.0</text>
          <text x="150" y="28" font-family="Inter, sans-serif" font-size="14" fill="#64748B">2026-03-21</text>
          <text x="300" y="28" font-family="Inter, sans-serif" font-size="14" fill="#0F172A">20</text>
          <text x="400" y="28" font-family="Inter, sans-serif" font-size="14" fill="#10B981">17</text>
          <text x="500" y="28" font-family="Inter, sans-serif" font-size="14" fill="#EF4444">3</text>
          <text x="600" y="28" font-family="Inter, sans-serif" font-size="14" fill="#64748B">0</text>
          <text x="700" y="28" font-family="Inter, sans-serif" font-size="14" fill="#0F172A">85%</text>
          <rect x="850" y="12" width="72" height="24" rx="4" fill="#FEE2E2"/>
          <text x="886" y="29" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#DC2626">有失败</text>
        </g>
        
        <!-- 行 2 -->
        <g transform="translate(0, 100)">
          <rect y="43" width="1088" height="1" fill="#F1F5F9"/>
          <text x="24" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#0F172A">v0.2.0</text>
          <text x="150" y="28" font-family="Inter, sans-serif" font-size="14" fill="#64748B">2026-03-19</text>
          <text x="300" y="28" font-family="Inter, sans-serif" font-size="14" fill="#0F172A">18</text>
          <text x="400" y="28" font-family="Inter, sans-serif" font-size="14" fill="#10B981">18</text>
          <text x="500" y="28" font-family="Inter, sans-serif" font-size="14" fill="#64748B">0</text>
          <text x="600" y="28" font-family="Inter, sans-serif" font-size="14" fill="#64748B">0</text>
          <text x="700" y="28" font-family="Inter, sans-serif" font-size="14" fill="#0F172A">82%</text>
          <rect x="850" y="12" width="72" height="24" rx="4" fill="#D1FAE5"/>
          <text x="886" y="29" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#059669">通过</text>
        </g>
        
        <!-- 行 3 -->
        <g transform="translate(0, 148)">
          <rect y="43" width="1088" height="1" fill="#F1F5F9"/>
          <text x="24" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#0F172A">v0.1.0</text>
          <text x="150" y="28" font-family="Inter, sans-serif" font-size="14" fill="#64748B">2026-03-15</text>
          <text x="300" y="28" font-family="Inter, sans-serif" font-size="14" fill="#0F172A">15</text>
          <text x="400" y="28" font-family="Inter, sans-serif" font-size="14" fill="#10B981">15</text>
          <text x="500" y="28" font-family="Inter, sans-serif" font-size="14" fill="#64748B">0</text>
          <text x="600" y="28" font-family="Inter, sans-serif" font-size="14" fill="#64748B">0</text>
          <text x="700" y="28" font-family="Inter, sans-serif" font-size="14" fill="#0F172A">75%</text>
          <rect x="850" y="12" width="72" height="24" rx="4" fill="#D1FAE5"/>
          <text x="886" y="29" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#059669">通过</text>
        </g>
      </g>
    </g>
  </g>
  
  <!-- ==================== 设计标注 ==================== -->
  <g transform="translate(950, 20)">
    <rect width="230" height="200" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="16" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#9A3412">📐 Projects 测试 Tab 要点</text>
    <g transform="translate(16, 40)">
      <text font-family="Inter, sans-serif" font-size="10" fill="#7C2D12">
        <tspan x="0" dy="0">1. Tab 切换: 0.2s ease 过渡</tspan>
        <tspan x="0" dy="14">2. 测试数据来源: test-results/</tspan>
        <tspan x="0" dy="14">3. Bug 数据来源: bugs/</tspan>
        <tspan x="0" dy="14">4. 表格行悬停高亮</tspan>
        <tspan x="0" dy="14">5. 状态标签颜色区分</tspan>
      </text>
    </g>
  </g>
</svg>