<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" style="background: #F8FAFC; font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;">
  <defs>
    <style>
      .sidebar-bg { fill: #1E293B; }
      .sidebar-dark { fill: #0F172A; }
      .sidebar-item-active { fill: #3B82F6; }
      .sidebar-item-hover:hover { fill: #334155; }
      .text-active { fill: #FFFFFF; font-size: 14px; font-weight: 600; }
      .text-muted { fill: #94A3B8; font-size: 14px; }
      .header-bg { fill: #FFFFFF; }
      .main-content-bg { fill: #F1F5F9; }
      .placeholder-text { fill: #94A3B8; font-size: 16px; }
    </style>
  </defs>
  
  <!-- 收缩后的左侧侧边栏 -->
  <g id="sidebar-collapsed">
    <!-- 侧边栏背景 -->
    <rect x="0" y="0" width="64" height="700" class="sidebar-bg"/>
    
    <!-- Logo 区域 -->
    <rect x="0" y="0" width="64" height="64" class="sidebar-dark"/>
    <text x="32" y="40" class="text-active" text-anchor="middle">D</text>
    
    <!-- 侧边栏菜单项（仅图标） -->
    <!-- Dashboard (active) -->
    <g transform="translate(16, 80)">
      <rect width="32" height="32" rx="8" class="sidebar-item-active"/>
      <text y="22" class="text-active" font-size="14" text-anchor="middle">📊</text>
    </g>
    
    <!-- Projects -->
    <g transform="translate(16, 120)" class="sidebar-item-hover">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <text y="22" class="text-muted" font-size="14" text-anchor="middle">📁</text>
    </g>
    
    <!-- Agents -->
    <g transform="translate(16, 160)" class="sidebar-item-hover">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <text y="22" class="text-muted" font-size="14" text-anchor="middle">👥</text>
    </g>
    
    <!-- Tasks -->
    <g transform="translate(16, 200)" class="sidebar-item-hover">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <text y="22" class="text-muted" font-size="14" text-anchor="middle">✅</text>
    </g>
    
    <!-- Versions -->
    <g transform="translate(16, 240)" class="sidebar-item-hover">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <text y="22" class="text-muted" font-size="14" text-anchor="middle">🏷️</text>
    </g>
    
    <!-- Documents -->
    <g transform="translate(16, 280)" class="sidebar-item-hover">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <text y="22" class="text-muted" font-size="14" text-anchor="middle">📄</text>
    </g>
    
    <!-- Settings -->
    <g transform="translate(16, 600)" class="sidebar-item-hover">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <text y="22" class="text-muted" font-size="14" text-anchor="middle">⚙️</text>
    </g>
    
    <!-- 展开按钮 -->
    <g transform="translate(16, 652)" class="sidebar-item-hover">
      <rect width="32" height="32" rx="8" fill="transparent"/>
      <text y="22" fill="#64748B" font-size="14" text-anchor="middle">▶</text>
    </g>
  </g>
  
  <!-- 右侧主内容区（自动扩展） -->
  <g id="main-content" transform="translate(64, 0)">
    <!-- Header -->
    <rect x="0" y="0" width="1136" height="64" class="header-bg"/>
    <line x1="0" y1="64" x2="1136" y2="64" stroke="#E2E8F0" stroke-width="1"/>
    
    <!-- Header 内容 -->
    <text x="24" y="40" fill="#0F172A" font-size="20" font-weight="600">Dashboard</text>
    
    <!-- 主题切换按钮 -->
    <g transform="translate(1036, 16)">
      <rect width="80" height="32" rx="16" fill="#F1F5F9"/>
      <text x="40" y="22" fill="#64748B" font-size="14" text-anchor="middle">☀ / 🌙</text>
    </g>
    
    <!-- 用户头像 -->
    <g transform="translate(1000, 16)">
      <circle cx="16" cy="16" r="16" fill="#E2E8F0"/>
      <text x="16" y="22" fill="#64748B" font-size="14" text-anchor="middle">👤</text>
    </g>
    
    <!-- 主内容区域（示意） -->
    <rect x="24" y="88" width="1088" height="580" rx="12" class="main-content-bg"/>
    <text x="568" y="382" class="placeholder-text" text-anchor="middle">主内容区域</text>
    <text x="568" y="410" class="placeholder-text" font-size="12" text-anchor="middle">侧边栏收缩后，主内容区自动扩展</text>
  </g>
</svg>
