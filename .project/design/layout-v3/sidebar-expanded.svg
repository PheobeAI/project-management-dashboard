<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" style="background: #F8FAFC; font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;">
  <defs>
    <style>
      .sidebar-bg { fill: #1E293B; }
      .sidebar-dark { fill: #0F172A; }
      .sidebar-item-active { fill: #3B82F6; }
      .sidebar-item { fill: transparent; }
      .sidebar-text-active { fill: #FFFFFF; font-size: 14px; font-weight: 500; }
      .sidebar-text { fill: #94A3B8; font-size: 14px; }
      .sidebar-text-muted { fill: #64748B; font-size: 14px; }
      .header-bg { fill: #FFFFFF; }
      .divider { stroke: #334155; stroke-width: 1; }
      .main-content-bg { fill: #FFFFFF; }
      .card { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; }
      .text-primary { fill: #0F172A; }
      .text-secondary { fill: #64748B; }
      .text-accent-blue { fill: #3B82F6; }
      .text-accent-green { fill: #10B981; }
      .text-accent-red { fill: #EF4444; }
      .stat-value { font-size: 28px; font-weight: 700; }
      .title { font-size: 20px; font-weight: 600; }
      .card-title { font-size: 16px; font-weight: 600; }
      .avatar { fill: #E2E8F0; }
      .progress-bg { fill: #E2E8F0; }
      .progress-fill-blue { fill: #3B82F6; }
      .progress-fill-green { fill: #10B981; }
    </style>
  </defs>
  
  <!-- 左侧侧边栏 -->
  <g id="sidebar">
    <!-- 侧边栏背景 -->
    <rect x="0" y="0" width="240" height="700" class="sidebar-bg"/>
    
    <!-- Logo 区域 -->
    <rect x="0" y="0" width="240" height="64" class="sidebar-dark"/>
    <text x="20" y="40" class="sidebar-text-active" font-weight="700">Dashboard</text>
    
    <!-- Dashboard (active) -->
    <g transform="translate(0, 64)">
      <rect x="0" y="0" width="240" height="48" class="sidebar-item-active"/>
      <text x="20" y="30" class="sidebar-text-active">📊 Dashboard</text>
    </g>
    
    <!-- Projects -->
    <g transform="translate(0, 112)">
      <rect x="0" y="0" width="240" height="48" class="sidebar-item"/>
      <text x="20" y="30" class="sidebar-text">📁 Projects</text>
    </g>
    
    <!-- Agents -->
    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="240" height="48" class="sidebar-item"/>
      <text x="20" y="30" class="sidebar-text">👥 Agents</text>
    </g>
    
    <!-- Tasks -->
    <g transform="translate(0, 208)">
      <rect x="0" y="0" width="240" height="48" class="sidebar-item"/>
      <text x="20" y="30" class="sidebar-text">✅ Tasks</text>
    </g>
    
    <!-- Versions -->
    <g transform="translate(0, 256)">
      <rect x="0" y="0" width="240" height="48" class="sidebar-item"/>
      <text x="20" y="30" class="sidebar-text">🏷️ Versions</text>
    </g>
    
    <!-- Documents -->
    <g transform="translate(0, 304)">
      <rect x="0" y="0" width="240" height="48" class="sidebar-item"/>
      <text x="20" y="30" class="sidebar-text">📄 Documents</text>
    </g>
    
    <!-- Divider -->
    <line x1="20" y1="370" x2="220" y2="370" class="divider"/>
    
    <!-- Settings -->
    <g transform="translate(0, 378)">
      <rect x="0" y="0" width="240" height="48" class="sidebar-item"/>
      <text x="20" y="30" class="sidebar-text">⚙️ Settings</text>
    </g>
    
    <!-- 收缩按钮 -->
    <g transform="translate(0, 652)">
      <rect x="0" y="0" width="240" height="48" class="sidebar-dark"/>
      <text x="20" y="30" class="sidebar-text-muted">◀ 收缩侧边栏</text>
    </g>
  </g>
  
  <!-- 右侧主内容区 -->
  <g id="main-content" transform="translate(240, 0)">
    <!-- Header -->
    <rect x="0" y="0" width="960" height="64" class="header-bg"/>
    <line x1="0" y1="64" x2="960" y2="64" stroke="#E2E8F0" stroke-width="1"/>
    
    <!-- Header 内容 -->
    <text x="24" y="40" class="title text-primary">Dashboard</text>
    
    <!-- 主题切换按钮 -->
    <g transform="translate(860, 16)">
      <rect width="80" height="32" rx="16" fill="#F1F5F9"/>
      <text x="40" y="22" fill="#64748B" font-size="14" text-anchor="middle">☀ / 🌙</text>
    </g>
    
    <!-- 用户头像 -->
    <g transform="translate(950, 16)">
      <circle cx="16" cy="16" r="16" class="avatar"/>
      <text x="16" y="22" fill="#64748B" font-size="14" text-anchor="middle">👤</text>
    </g>
    
    <!-- 主内容区域 -->
    <g transform="translate(24, 88)">
      <!-- Stats Cards -->
      <g transform="translate(0, 0)">
        <rect width="200" height="100" rx="12" class="card"/>
        <text x="16" y="30" class="text-secondary" font-size="12">项目总数</text>
        <text x="16" y="65" class="stat-value text-primary">12</text>
      </g>
      
      <g transform="translate(216, 0)">
        <rect width="200" height="100" rx="12" class="card"/>
        <text x="16" y="30" class="text-secondary" font-size="12">进行中</text>
        <text x="16" y="65" class="stat-value text-accent-blue">5</text>
      </g>
      
      <g transform="translate(432, 0)">
        <rect width="200" height="100" rx="12" class="card"/>
        <text x="16" y="30" class="text-secondary" font-size="12">已完成</text>
        <text x="16" y="65" class="stat-value text-accent-green">4</text>
      </g>
      
      <g transform="translate(648, 0)">
        <rect width="200" height="100" rx="12" class="card"/>
        <text x="16" y="30" class="text-secondary" font-size="12">阻塞</text>
        <text x="16" y="65" class="stat-value text-accent-red">3</text>
      </g>
      
      <!-- Project Cards -->
      <g transform="translate(0, 124)">
        <rect width="440" height="180" rx="12" class="card"/>
        <circle cx="16" cy="16" r="6" fill="#3B82F6"/>
        <text x="28" y="20" class="card-title text-primary">char-counter</text>
        <text x="16" y="50" class="text-secondary" font-size="12">Phase 3 - 开发中</text>
        <rect x="16" y="65" width="408" height="8" rx="4" class="progress-bg"/>
        <rect x="16" y="65" width="280" height="8" rx="4" class="progress-fill-blue"/>
        <text x="16" y="95" class="text-primary" font-size="14">80% 正常</text>
        <text x="120" y="95" class="text-secondary" font-size="12">等待: Designer</text>
      </g>
      
      <g transform="translate(456, 124)">
        <rect width="440" height="180" rx="12" class="card"/>
        <circle cx="16" cy="16" r="6" fill="#10B981"/>
        <text x="28" y="20" class="card-title text-primary">web-server</text>
        <text x="16" y="50" class="text-secondary" font-size="12">Phase 5 - 部署</text>
        <rect x="16" y="65" width="408" height="8" rx="4" class="progress-bg"/>
        <rect x="16" y="65" width="360" height="8" rx="4" class="progress-fill-green"/>
        <text x="16" y="95" class="text-primary" font-size="14">100% 完成</text>
      </g>
      
      <!-- Phase Timeline Section -->
      <g transform="translate(0, 320)">
        <rect width="880" height="180" rx="12" class="card"/>
        <text x="20" y="30" class="card-title text-primary">项目阶段进展</text>
        
        <!-- Timeline -->
        <g transform="translate(20, 60)">
          <!-- P0 - Completed -->
          <line x1="40" y1="20" x2="80" y2="20" stroke="#10B981" stroke-width="3"/>
          <circle cx="30" cy="20" r="12" fill="#10B981"/>
          <text x="30" y="50" class="text-secondary" font-size="11" text-anchor="middle">P0</text>
          
          <!-- P1 - Completed -->
          <line x1="110" y1="20" x2="150" y2="20" stroke="#10B981" stroke-width="3"/>
          <circle cx="100" cy="20" r="12" fill="#10B981"/>
          <text x="100" y="50" class="text-secondary" font-size="11" text-anchor="middle">P1</text>
          
          <!-- P2 - Completed -->
          <line x1="180" y1="20" x2="220" y2="20" stroke="#10B981" stroke-width="3"/>
          <circle cx="170" cy="20" r="12" fill="#10B981"/>
          <text x="170" y="50" class="text-secondary" font-size="11" text-anchor="middle">P2</text>
          
          <!-- P3 - Current (highlighted) -->
          <line x1="250" y1="20" x2="290" y2="20" stroke="#3B82F6" stroke-width="3"/>
          <circle cx="240" cy="20" r="16" fill="#3B82F6"/>
          <circle cx="240" cy="20" r="24" fill="none" stroke="#3B82F6" stroke-width="3" opacity="0.3"/>
          <text x="240" y="50" fill="#3B82F6" font-size="11" font-weight="600" text-anchor="middle">P3</text>
          
          <!-- P4-P8 - Pending -->
          <g opacity="0.5">
            <line x1="320" y1="20" x2="360" y2="20" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4"/>
            <circle cx="310" cy="20" r="8" fill="#CBD5E1"/>
            <text x="310" y="50" fill="#94A3B8" font-size="11" text-anchor="middle">P4</text>
            
            <line x1="390" y1="20" x2="430" y2="20" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4"/>
            <circle cx="380" cy="20" r="8" fill="#CBD5E1"/>
            <text x="380" y="50" fill="#94A3B8" font-size="11" text-anchor="middle">P5</text>
            
            <line x1="460" y1="20" x2="500" y2="20" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4"/>
            <circle cx="450" cy="20" r="8" fill="#CBD5E1"/>
            <text x="450" y="50" fill="#94A3B8" font-size="11" text-anchor="middle">P6</text>
            
            <line x1="530" y1="20" x2="570" y2="20" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4"/>
            <circle cx="520" cy="20" r="8" fill="#CBD5E1"/>
            <text x="520" y="50" fill="#94A3B8" font-size="11" text-anchor="middle">P7</text>
            
            <line x1="600" y1="20" x2="640" y2="20" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="4"/>
            <circle cx="590" cy="20" r="8" fill="#CBD5E1"/>
            <text x="590" y="50" fill="#94A3B8" font-size="11" text-anchor="middle">P8</text>
          </g>
        </g>
        
        <!-- Phase Details Card -->
        <g transform="translate(20, 110)">
          <rect width="400" height="50" rx="8" fill="#DBEAFE"/>
          <text x="16" y="22" fill="#2563EB" font-size="12" font-weight="500">Phase 3 - 开发中</text>
          <text x="16" y="40" fill="#64748B" font-size="11">等待: Designer (revise_requirements)</text>
          <text x="250" y="22" fill="#64748B" font-size="11">开始: 2026-03-15</text>
          <text x="250" y="40" fill="#64748B" font-size="11">已进行: 5 天</text>
        </g>
      </g>
      
      <!-- Test Records Section -->
      <g transform="translate(0, 516)">
        <rect width="880" height="160" rx="12" class="card"/>
        <text x="20" y="30" class="card-title text-primary">测试详情</text>
        
        <!-- Bug Stats -->
        <g transform="translate(20, 50)">
          <text x="0" y="12" class="text-secondary" font-size="11">Bug 统计</text>
          
          <g transform="translate(0, 20)">
            <rect width="140" height="70" rx="8" class="card"/>
            <text x="12" y="20" class="text-secondary" font-size="10">总 Bug</text>
            <text x="12" y="50" class="stat-value text-accent-blue">12</text>
          </g>
          
          <g transform="translate(156, 20)">
            <rect width="140" height="70" rx="8" class="card"/>
            <text x="12" y="20" class="text-secondary" font-size="10">已修复</text>
            <text x="12" y="50" class="stat-value text-accent-green">8</text>
          </g>
          
          <g transform="translate(312, 20)">
            <rect width="140" height="70" rx="8" class="card"/>
            <text x="12" y="20" class="text-secondary" font-size="10">未修复</text>
            <text x="12" y="50" class="stat-value text-accent-red">4</text>
          </g>
          
          <g transform="translate(468, 20)">
            <rect width="140" height="70" rx="8" class="card"/>
            <text x="12" y="20" class="text-secondary" font-size="10">修复率</text>
            <text x="12" y="50" class="stat-value text-accent-green">67%</text>
          </g>
        </g>
        
        <!-- Reviews History -->
        <g transform="translate(640, 50)">
          <text x="0" y="12" class="text-secondary" font-size="11">评审历史</text>
          
          <g transform="translate(0, 20)">
            <rect width="200" height="70" rx="8" fill="#DCFCE7"/>
            <text x="12" y="20" fill="#166534" font-size="10">v_1 Designer ✅</text>
            <text x="12" y="36" fill="#166534" font-size="10">v_1 Engineer ✅</text>
            <text x="12" y="52" fill="#166534" font-size="10">v_2 Boss ❌ NEEDS</text>
          </g>
        </g>
      </g>
    </g>
  </g>
</svg>
