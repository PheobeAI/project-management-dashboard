<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="trend-up" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="900" fill="#F8FAFC"/>
  
  <!-- ==================== Header ==================== -->
  <g id="header">
    <rect width="1200" height="64" fill="white" filter="url(#shadow-sm)"/>
    <text x="32" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#0F172A">Log</text>
    <g transform="translate(880, 16)">
      <rect width="80" height="32" rx="6" fill="#F1F5F9" stroke="#E2E8F0"/>
      <text x="15" y="21" font-family="Inter, sans-serif" font-size="12" fill="#64748B">类型 ▼</text>
      <rect x="90" y="0" width="80" height="32" rx="6" fill="#F1F5F9" stroke="#E2E8F0"/>
      <text x="105" y="21" font-family="Inter, sans-serif" font-size="12" fill="#64748B">时间 ▼</text>
    </g>
  </g>
  
  <!-- ==================== 系统健康状态 ==================== -->
  <g id="health-status" transform="translate(32, 88)">
    <rect width="1136" height="80" rx="12" fill="white" filter="url(#shadow-md)"/>
    
    <text x="24" y="24" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0F172A">系统健康状态</text>
    
    <!-- 今日异常 -->
    <g transform="translate(24, 40)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="12" fill="#64748B">今日异常</text>
      <text x="0" y="24" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#EF4444">3</text>
      <rect x="36" y="8" width="32" height="16" rx="4" fill="#FEE2E2"/>
      <text x="52" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#DC2626">↑2</text>
    </g>
    
    <!-- Agent 掉线 -->
    <g transform="translate(160, 40)">
      <circle cx="8" cy="8" r="6" fill="#EF4444"/>
      <text x="24" y="0" font-family="Inter, sans-serif" font-size="12" fill="#64748B">Agent 掉线</text>
      <text x="24" y="24" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0F172A">1</text>
    </g>
    
    <!-- Task 停滞 -->
    <g transform="translate(300, 40)">
      <circle cx="8" cy="8" r="6" fill="#F59E0B"/>
      <text x="24" y="0" font-family="Inter, sans-serif" font-size="12" fill="#64748B">Task 停滞</text>
      <text x="24" y="24" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0F172A">2</text>
    </g>
    
    <!-- 加载失败 -->
    <g transform="translate(440, 40)">
      <circle cx="8" cy="8" r="6" fill="#F59E0B"/>
      <text x="24" y="0" font-family="Inter, sans-serif" font-size="12" fill="#64748B">加载失败</text>
      <text x="24" y="24" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0F172A">0</text>
    </g>
    
    <!-- 系统错误 -->
    <g transform="translate(580, 40)">
      <circle cx="8" cy="8" r="6" fill="#EF4444"/>
      <text x="24" y="0" font-family="Inter, sans-serif" font-size="12" fill="#64748B">系统错误</text>
      <text x="24" y="24" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0F172A">0</text>
    </g>
  </g>
  
  <!-- ==================== 日志列表 ==================== -->
  <g id="log-list" transform="translate(32, 192)">
    
    <!-- 🔴 高严重度 -->
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#0F172A">🔴 高严重度 (2)</text>
    
    <g transform="translate(0, 20)" filter="url(#shadow-sm)">
      <rect width="1136" height="100" rx="12" fill="white"/>
      
      <!-- 左侧红色指示条 -->
      <rect width="4" height="100" rx="2" fill="#EF4444"/>
      
      <!-- 内容 -->
      <text x="24" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#0F172A">Agent Designer 掉线</text>
      <text x="24" y="50" font-family="Inter, sans-serif" font-size="12" fill="#64748B">最后响应: 2026-03-21 10:30</text>
      <text x="24" y="72" font-family="Inter, sans-serif" font-size="12" fill="#94A3B8">持续时间: 2 小时 15 分钟</text>
      
      <!-- 状态标签 -->
      <rect x="950" y="16" width="72" height="24" rx="4" fill="#FEE2E2"/>
      <text x="986" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#DC2626">未解决</text>
      
      <!-- 查看详情按钮 -->
      <rect x="1040" y="16" width="72" height="24" rx="4" fill="#DBEAFE"/>
      <text x="1076" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2563EB">查看详情</text>
    </g>
    
    <g transform="translate(0, 130)" filter="url(#shadow-sm)">
      <rect width="1136" height="100" rx="12" fill="white"/>
      <rect width="4" height="100" rx="2" fill="#EF4444"/>
      
      <text x="24" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#0F172A">Task TASK-003 停滞超过 48 小时</text>
      <text x="24" y="50" font-family="Inter, sans-serif" font-size="12" fill="#64748B">等待 Agent: Engineer | 自: 2026-03-19</text>
      <text x="24" y="72" font-family="Inter, sans-serif" font-size="12" fill="#94A3B8">任务: 实现深色模式切换功能</text>
      
      <rect x="950" y="16" width="72" height="24" rx="4" fill="#FEE2E2"/>
      <text x="986" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#DC2626">未解决</text>
      
      <rect x="1040" y="16" width="72" height="24" rx="4" fill="#DBEAFE"/>
      <text x="1076" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2563EB">查看详情</text>
    </g>
    
    <!-- 🟡 中严重度 -->
    <text x="0" y="280" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#0F172A">🟡 中严重度 (1)</text>
    
    <g transform="translate(0, 300)" filter="url(#shadow-sm)">
      <rect width="1136" height="100" rx="12" fill="white"/>
      <rect width="4" height="100" rx="2" fill="#F59E0B"/>
      
      <text x="24" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#0F172A">项目 char-counter 数据加载失败</text>
      <text x="24" y="50" font-family="Inter, sans-serif" font-size="12" fill="#64748B">原因: .project/status.json 格式错误</text>
      <text x="24" y="72" font-family="Inter, sans-serif" font-size="12" fill="#94A3B8">时间: 2026-03-21 09:15</text>
      
      <rect x="950" y="16" width="72" height="24" rx="4" fill="#FEF3C7"/>
      <text x="986" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#D97706">已忽略</text>
      
      <rect x="1040" y="16" width="72" height="24" rx="4" fill="#DBEAFE"/>
      <text x="1076" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#2563EB">查看详情</text>
    </g>
    
    <!-- ⚪ 已解决 -->
    <text x="0" y="450" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#0F172A">⚪ 已解决 (5)</text>
    
    <g transform="translate(0, 470)" filter="url(#shadow-sm)">
      <rect width="1136" height="72" rx="12" fill="white"/>
      <rect width="4" height="72" rx="2" fill="#10B981"/>
      
      <text x="24" y="28" font-family="Inter, sans-serif" font-size="14" fill="#64748B">Agent Art 已重新连接</text>
      <text x="24" y="50" font-family="Inter, sans-serif" font-size="12" fill="#94A3B8">解决时间: 2026-03-21 08:30</text>
      
      <rect x="950" y="16" width="72" height="24" rx="4" fill="#D1FAE5"/>
      <text x="986" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#059669">已解决</text>
    </g>
  </g>
  
  <!-- ==================== 设计标注 ==================== -->
  <g transform="translate(950, 20)">
    <rect width="230" height="180" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="16" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#9A3412">📐 Log 页面设计要点</text>
    <g transform="translate(16, 40)">
      <text font-family="Inter, sans-serif" font-size="10" fill="#7C2D12">
        <tspan x="0" dy="0">1. 严重程度颜色区分</tspan>
        <tspan x="0" dy="14">   🔴 高=#EF4444</tspan>
        <tspan x="0" dy="12">   🟡 中=#F59E0B</tspan>
        <tspan x="0" dy="14">2. 左侧红色指示条</tspan>
        <tspan x="0" dy="14">3. 状态标签: 未解决/已忽略/已解决</tspan>
        <tspan x="0" dy="14">4. 悬停显示操作按钮</tspan>
      </text>
    </g>
  </g>
</svg>