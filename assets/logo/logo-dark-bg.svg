<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- 深色背景版本，适合浅色页面使用 -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
  </defs>
  
  <!-- 三个人物/节点图标，表示团队 -->
  <circle cx="80" cy="100" r="28" fill="white" opacity="0.95"/>
  <circle cx="176" cy="100" r="28" fill="white" opacity="0.95"/>
  <circle cx="128" cy="168" r="28" fill="white" opacity="0.95"/>
  
  <!-- 头部 -->
  <circle cx="80" cy="92" r="12" fill="#1E40AF"/>
  <circle cx="176" cy="92" r="12" fill="#1E40AF"/>
  <circle cx="128" cy="160" r="12" fill="#1E40AF"/>
  
  <!-- 身体用圆角矩形表示 -->
  <ellipse cx="80" cy="116" rx="16" ry="12" fill="white"/>
  <ellipse cx="176" cy="116" rx="16" ry="12" fill="white"/>
  <ellipse cx="128" cy="184" rx="16" ry="12" fill="white"/>
  
  <!-- 连接线，表示协作 -->
  <line x1="96" y1="108" x2="112" y2="140" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="160" y1="108" x2="144" y2="140" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="104" y1="116" x2="152" y2="116" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
</svg>