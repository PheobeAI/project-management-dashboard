<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
  </defs>
  
  <!-- 深色背景圆 -->
  <circle cx="128" cy="128" r="120" fill="#1E293B"/>
  
  <!-- 三个任务/项目方块，代表团队协作 -->
  <!-- 方块1 - 左上 -->
  <rect x="52" y="72" width="44" height="44" rx="8" fill="url(#primaryGrad)"/>
  
  <!-- 方块2 - 右下 -->
  <rect x="160" y="140" width="44" height="44" rx="8" fill="url(#primaryGrad)"/>
  
  <!-- 方块3 - 中心偏上 -->
  <rect x="106" y="96" width="44" height="44" rx="8" fill="#60A5FA"/>
  
  <!-- 连接线，表示流程/协作 -->
  <path d="M96 88 L106 118" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M150 118 L160 156" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M128 140 L128 156" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- 进度指示点 -->
  <circle cx="96" cy="88" r="4" fill="#10B981"/>
  <circle cx="150" cy="118" r="4" fill="#F59E0B"/>
  <circle cx="128" cy="140" r="4" fill="#3B82F6"/>
</svg>